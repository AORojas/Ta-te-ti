<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ta-Te-Ti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="app">
        <section class="game-card">
            <div class="hero">
                <p class="eyebrow">Juego clasico</p>
                <h1>Ta-Te-Ti</h1>
            </div>

            <div class="hud">
                <div class="turn-chip">
                    <span class="turn-label">Turno actual</span>
                    <strong id="current-player">X</strong>
                </div>
                <div class="scoreboard" aria-label="Marcador">
                    <div class="score-item">
                        <span class="score-label">X</span>
                        <strong id="score-x">0</strong>
                    </div>
                    <div class="score-item">
                        <span class="score-label">O</span>
                        <strong id="score-o">0</strong>
                    </div>
                </div>
            </div>

            <p id="status">Presiona Jugar para empezar</p>
            <div class="board" id="board" aria-label="Tablero de Ta-Te-Ti">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="actions">
                <button id="play-action">Jugar</button>
                <button id="restart" class="secondary-button">Reiniciar</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
